services:
  - type: web
    name: nvdrive-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: BASE_URL
        sync: false   # Set this manually in Render dashboard to your service URL
