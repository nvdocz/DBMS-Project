services:
  - type: web
    name: nvdrive-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: BASE_URL
        sync: false   # Set to your Render service URL e.g. https://nvdrive-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: nvdrive-db
          property: connectionString

databases:
  - name: nvdrive-db
    plan: free
